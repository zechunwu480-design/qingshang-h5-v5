<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiper Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    .swiper { width: 100%; height: 100%; background: #fff; }
    .swiper-slide { display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .slide1 { background: #FFF9E6; }
    .slide2 { background: #F0FFF0; }
    .slide3 { background: #F0F0FF; }
  </style>
</head>
<body>
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide slide1">第1页 - 企业健康体检</div>
      <div class="swiper-slide slide2">第2页 - 融资规划</div>
      <div class="swiper-slide slide3">第3页 - 立即预约</div>
    </div>
    <div class="swiper-pagination"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper.min.js"></script>
  <script>
    var swiper = new Swiper('.swiper', {
      direction: 'vertical',
      pagination: { el: '.swiper-pagination', clickable: true }
    });
  </script>
</body>
</html>
